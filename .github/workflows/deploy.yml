name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PROJECT_NAME: "Mohamad Naji Portfolio"
  DEPLOY_PATH: /var/www/mohamad-naji-portfolio

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Test, Lint & Build
  # Runs on GitHub's machine — npm ci once
  # Blocks deployment if anything fails
  # ─────────────────────────────────────────
  build:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint src/ --max-warnings=0

      - name: Run tests
        run: npm run test -- --watchAll=false --passWithNoTests
        env:
          CI: true

      - name: Build
        run: npm run build
        env:
          REACT_APP_EMAILJS_SERVICE_ID: ${{ secrets.REACT_APP_EMAILJS_SERVICE_ID }}
          REACT_APP_EMAILJS_TEMPLATE_ID: ${{ secrets.REACT_APP_EMAILJS_TEMPLATE_ID }}
          REACT_APP_EMAILJS_PUBLIC_KEY: ${{ secrets.REACT_APP_EMAILJS_PUBLIC_KEY }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: build/
          retention-days: 1

  # ─────────────────────────────────────────
  # JOB 2: Deploy
  # Only runs on push to main (not PRs)
  # Only runs if build job passes
  # Downloads the build artifact and sends
  # it to the server — no npm on server needed
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build
          path: build/

      - name: Backup current build on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            echo "💾 Backing up current build..."
            rm -rf ${{ env.DEPLOY_PATH }}/build-backup
            cp -r ${{ env.DEPLOY_PATH }}/build ${{ env.DEPLOY_PATH }}/build-backup

      - name: Upload new build to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: "build/"
          target: ${{ env.DEPLOY_PATH }}

      - name: Health check & cleanup
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            echo "🏥 Running health check..."
            sleep 3
            HTTP_STATUS=$(curl -o /dev/null -s -w "%{http_code}" -k http://${{ secrets.SERVER_HOST }})
            if [ "$HTTP_STATUS" -eq 200 ]; then
              echo "✅ Site is up! (HTTP $HTTP_STATUS)"
              rm -rf ${{ env.DEPLOY_PATH }}/build-backup
            else
              echo "❌ Health check failed! Rolling back..."
              rm -rf ${{ env.DEPLOY_PATH }}/build
              mv ${{ env.DEPLOY_PATH }}/build-backup ${{ env.DEPLOY_PATH }}/build
              exit 1
            fi

      # ── Notify on success ──
      - name: Notify success
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ✅ *${{ env.PROJECT_NAME }} — Deployment Successful!*

            🌍 Site: http://${{ secrets.SERVER_HOST }}
            👤 Triggered by: ${{ github.actor }}
            📝 Commit: ${{ github.event.head_commit.message }}
            📅 Time: ${{ github.event.head_commit.timestamp }}

      # ── Notify on failure ──
      - name: Notify failure
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ❌ *${{ env.PROJECT_NAME }} — Deployment Failed!*

            👤 Triggered by: ${{ github.actor }}
            📝 Commit: ${{ github.event.head_commit.message }}
            📅 Time: ${{ github.event.head_commit.timestamp }}
            🔍 Check logs: https://github.com/${{ github.repository }}/actions
