name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Test & Lint
  # Runs on every push and pull request
  # Blocks deployment if anything fails
  # ─────────────────────────────────────────
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint src/ --max-warnings=0

      - name: Run tests
        run: npm run test -- --watchAll=false --passWithNoTests
        env:
          CI: true

  # ─────────────────────────────────────────
  # JOB 2: Deploy
  # Only runs on push to main (not PRs)
  # Only runs if test job passes
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e  # stop script immediately if any command fails

            cd /var/www/mohamad-naji-portfolio

            echo "📦 Pulling latest code..."
            git pull origin main

            echo "⚡ Checking if dependencies need update..."
            if git diff HEAD~1 --name-only | grep -q "package-lock.json"; then
              echo "package-lock.json changed — running npm ci..."
              npm ci
            else
              echo "No dependency changes — skipping npm ci"
            fi

            echo "💾 Backing up current build..."
            rm -rf build-backup
            cp -r build build-backup

            echo "🔨 Building new version..."
            if npm run build; then
              echo "✅ Build successful!"
              rm -rf build-backup
            else
              echo "❌ Build failed! Rolling back to previous version..."
              rm -rf build
              mv build-backup build
              exit 1
            fi

            echo "🏥 Running health check..."
            sleep 3
            HTTP_STATUS=$(curl -o /dev/null -s -w "%{http_code}" https://${{ secrets.SERVER_HOST }})
            if [ "$HTTP_STATUS" -eq 200 ]; then
              echo "✅ Site is up and running! (HTTP $HTTP_STATUS)"
            else
              echo "⚠️ Health check warning: HTTP $HTTP_STATUS"
            fi

      # ── Notify on success ──
      - name: Notify success
        if: success()
        uses: appleboy/telegram-action@v1
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ✅ *Deployment Successful!*

            🌍 Site: https://${{ secrets.SERVER_HOST }}
            👤 Triggered by: ${{ github.actor }}
            📝 Commit: ${{ github.event.head_commit.message }}
            📅 Time: ${{ github.event.head_commit.timestamp }}

      # ── Notify on failure ──
      - name: Notify failure
        if: failure()
        uses: appleboy/telegram-action@v1
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ❌ *Deployment Failed!*

            👤 Triggered by: ${{ github.actor }}
            📝 Commit: ${{ github.event.head_commit.message }}
            📅 Time: ${{ github.event.head_commit.timestamp }}
            🔍 Check logs: https://github.com/${{ github.repository }}/actions
